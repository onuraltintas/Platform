<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm">
        <div class="card-header text-center bg-primary text-white">
          <h3 class="mb-0">Şifre Sıfırla</h3>
        </div>
        <div class="card-body p-4">
          <form (ngSubmit)="onSubmit()" novalidate>
            <!-- Hidden email (kept for backend) -->
            <input type="hidden" name="email" [(ngModel)]="resetPasswordRequest.email" />

            <!-- Yeni Şifre -->
            <div class="form-floating mb-2 position-relative">
              <input
                [type]="passwordVisible ? 'text' : 'password'"
                class="form-control password-input"
                id="newPassword"
                name="newPassword"
                placeholder="Yeni Şifre"
                [(ngModel)]="resetPasswordRequest.newPassword"
                required
                [class.is-invalid]="resetPasswordRequest.newPassword && !passwordMeetsPolicy"
              />
              <label for="newPassword">Yeni Şifre</label>
              <button type="button" class="btn btn-outline-secondary position-absolute top-0 end-0 h-100" (click)="toggle('password')">
                <i class="bi" [class.bi-eye]="!passwordVisible" [class.bi-eye-slash]="passwordVisible"></i>
              </button>
            </div>

            <!-- Görsel Checklist -->
            <ul class="list-unstyled small mb-3">
              <li [class.text-success]="hasMinLen" [class.text-danger]="!hasMinLen">
                <i class="bi" [class.bi-check-circle-fill]="hasMinLen" [class.bi-x-circle-fill]="!hasMinLen"></i>
                En az 8 karakter
              </li>
              <li [class.text-success]="hasUpper" [class.text-danger]="!hasUpper">
                <i class="bi" [class.bi-check-circle-fill]="hasUpper" [class.bi-x-circle-fill]="!hasUpper"></i>
                En az bir büyük harf (A-Z)
              </li>
              <li [class.text-success]="hasDigit" [class.text-danger]="!hasDigit">
                <i class="bi" [class.bi-check-circle-fill]="hasDigit" [class.bi-x-circle-fill]="!hasDigit"></i>
                En az bir rakam (0-9)
              </li>
              <li [class.text-success]="hasSpecial" [class.text-danger]="!hasSpecial">
                <i class="bi" [class.bi-check-circle-fill]="hasSpecial" [class.bi-x-circle-fill]="!hasSpecial"></i>
                En az bir özel karakter (!@#$%^&* vb.)
              </li>
            </ul>

            <!-- Yeni Şifre Tekrar -->
            <div class="form-floating mb-3 position-relative">
              <input
                [type]="confirmPasswordVisible ? 'text' : 'password'"
                class="form-control password-input"
                id="confirmPassword"
                name="confirmPassword"
                placeholder="Yeni Şifre Tekrar"
                [(ngModel)]="resetPasswordRequest.confirmPassword"
                required
                [class.is-invalid]="resetPasswordRequest.confirmPassword && !passwordsMatch"
              />
              <label for="confirmPassword">Yeni Şifre Tekrar</label>
              <button type="button" class="btn btn-outline-secondary position-absolute top-0 end-0 h-100" (click)="toggle('confirm')">
                <i class="bi" [class.bi-eye]="!confirmPasswordVisible" [class.bi-eye-slash]="confirmPasswordVisible"></i>
              </button>
              <div *ngIf="resetPasswordRequest.confirmPassword && !passwordsMatch" class="invalid-feedback d-block">
                Şifreler eşleşmiyor
              </div>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-lg">Şifreyi Sıfırla</button>
            </div>
          </form>
        </div>
        <div class="card-footer text-center text-muted">
          <small><a routerLink="/auth/login">Giriş sayfasına geri dön</a></small>
        </div>
      </div>
    </div>
  </div>
</div>
