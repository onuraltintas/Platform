<div class="container py-4">
  <div class="d-flex align-items-center mb-3">
    <h2 class="mb-0">{{ permissionId ? 'İzini Düzenle' : 'Yeni İzin' }}</h2>
    <a class="btn btn-outline-secondary ms-auto" [routerLink]="['/permissions']">Geri Dön</a>
  </div>

  <form [formGroup]="form" (ngSubmit)="save()">
    <div class="card mb-4">
      <div class="card-header"><h5 class="mb-0">Temel Bilgiler</h5></div>
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Ad <span class="text-danger">*</span></label>
            <input class="form-control" formControlName="name" placeholder="Orn: MyNewService.Read">
          </div>
          <div class="col-md-6">
            <label class="form-label">Grup</label>
            <input class="form-control" formControlName="group" placeholder="Orn: MyNewService">
          </div>
          <div class="col-12">
            <label class="form-label">Açıklama</label>
            <textarea class="form-control" rows="3" formControlName="description"></textarea>
          </div>
          <div class="col-12">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" formControlName="isActive">
              <label class="form-check-label">Aktif</label>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="d-flex justify-content-end gap-2">
      <a class="btn btn-outline-secondary" [routerLink]="['/permissions']">İptal</a>
      <button class="btn btn-primary" type="submit">Kaydet</button>
    </div>
  </form>
</div>
