<div class="container py-3">
  <div class="d-flex align-items-center mb-3">
    <h4 class="mb-0">Rol → İzin Yönetimi</h4>
    <select class="form-select ms-auto" style="max-width: 340px;" [ngModel]="selectedRoleId()" (ngModelChange)="selectedRoleId.set($event); onRoleChange()">
      <option [ngValue]="null">Rol seçiniz...</option>
      <option *ngFor="let r of roles()" [ngValue]="r.id">{{ r.name }}</option>
    </select>
  </div>

  <div *ngIf="!selectedRoleId()" class="alert alert-info">İzinleri düzenlemek için bir rol seçiniz.</div>

  <div class="card" *ngIf="selectedRoleId()">
    <div class="card-body">
      <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3">
        <div class="col" *ngFor="let p of permissions()">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" [checked]="isChecked(p.name)" (change)="togglePermission(p, $event)" [id]="'perm-'+p.id">
            <label class="form-check-label" [for]="'perm-'+p.id">
              <strong>{{ p.name }}</strong>
              <div class="text-muted small">{{ p.description || '-' }}</div>
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
