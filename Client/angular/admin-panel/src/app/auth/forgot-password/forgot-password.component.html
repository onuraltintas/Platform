<div class="auth-container">
  <div class="auth-wrapper">
    <!-- Sol Panel: Marka Kimliği -->
    <div class="auth-brand-panel">
      <div class="brand-content">
        <div class="brand-logo">
          <i class="bi bi-shield-check"></i>
        </div>
        <h1 class="brand-title">OnAl Yazılım Otomasyon</h1>
        <p class="brand-tagline">Güvenliğiniz Bizim Önceliğimiz</p>
      </div>
    </div>

    <!-- Sağ Panel: Şifre Sıfırlama Formu -->
    <div class="auth-form-panel">
      <div class="form-content">
        <div class="form-header">
          <h2>Şifremi Unuttum</h2>
          <p>Sıfırlama linki göndermek için e-posta adresinizi girin.</p>
        </div>

        <form (ngSubmit)="onSubmit()">
          <div class="input-group mb-4">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <div class="form-floating">
              <input
                type="email"
                class="form-control"
                id="email"
                placeholder="E-posta Adresiniz"
                name="email"
                [(ngModel)]="forgotPasswordRequest.email"
                required
              />
              <label for="email">E-posta Adresiniz</label>
            </div>
          </div>

          <div class="d-grid mb-2">
            <button type="submit" class="btn btn-primary btn-lg" [disabled]="isLoading">
              <span *ngIf="!isLoading">Sıfırlama Linki Gönder</span>
              <span *ngIf="isLoading" class="d-inline-flex align-items-center gap-2">
                <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                Gönderiliyor...
              </span>
            </button>
          </div>

          <div class="alert alert-info py-2" *ngIf="emailSent">
            Eğer e-posta adresiniz sistemde kayıtlıysa, şifre sıfırlama talimatları gönderildi.
          </div>

          <div class="text-center mt-4">
            <a routerLink="/login" class="text-decoration-none">Giriş Sayfasına Geri Dön</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
