<div class="auth-container">
  <div class="auth-wrapper">
    <!-- Sol Panel: Marka Kimliği -->
    <div class="auth-brand-panel">
      <div class="brand-content">
        <div class="brand-logo">
          <i class="bi bi-book"></i>
        </div>
        <h1 class="brand-title">Hızlı Okuma Platformu</h1>
        <p class="brand-tagline">Okuma Hızınızı 3 Katına Çıkarın</p>
      </div>
    </div>

    <!-- Sağ Panel: Giriş Formu -->
    <div class="auth-form-panel">
      <div class="form-content">
        <div class="form-header">
          <h2>Hoş Geldiniz</h2>
          <p>Hızlı okuma eğitiminize devam etmek için giriş yapın.</p>
        </div>

        <form (ngSubmit)="onLogin()">
          <div class="input-group mb-3">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <div class="form-floating">
              <input
                type="text"
                class="form-control"
                id="emailOrUsername"
                placeholder="Kullanıcı Adı veya E-posta"
                name="emailOrUsername"
                [(ngModel)]="loginRequest.emailOrUsername"
                required
              />
              <label for="emailOrUsername">Kullanıcı Adı veya E-posta</label>
            </div>
          </div>

          <div class="input-group mb-3">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <div class="form-floating">
              <input
                [type]="passwordVisible ? 'text' : 'password'"
                class="form-control"
                id="password"
                placeholder="Şifre"
                name="password"
                [(ngModel)]="loginRequest.password"
                required
              />
              <label for="password">Şifre</label>
            </div>
            <button 
              class="btn btn-outline-secondary" 
              type="button" 
              (click)="togglePasswordVisibility()">
              <i class="bi" [class.bi-eye]="!passwordVisible" [class.bi-eye-slash]="passwordVisible"></i>
            </button>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
              <input
                type="checkbox"
                class="form-check-input"
                id="rememberMe"
                name="rememberMe"
                [(ngModel)]="loginRequest.rememberMe"
              />
              <label class="form-check-label" for="rememberMe">Beni Hatırla</label>
            </div>
            <a routerLink="/auth/forgot-password" class="text-decoration-none">Şifremi Unuttum?</a>
          </div>

          <div class="d-grid mb-3">
            <button 
              type="submit" 
              class="btn btn-primary btn-lg"
              [disabled]="isLoading">
              <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
              {{ isLoading ? 'Giriş Yapılıyor...' : 'Giriş Yap' }}
            </button>
          </div>
          
          <div class="alert alert-warning d-flex align-items-start gap-2" *ngIf="unconfirmedEmailWarning">
            <i class="bi bi-exclamation-triangle-fill mt-1"></i>
            <div>
              <div><strong>E-posta doğrulaması gerekli.</strong> Hesabınızı doğrulamadan giriş yapamazsınız.</div>
              <button class="btn btn-sm btn-outline-warning mt-2" type="button" (click)="resendConfirmationEmail()" [disabled]="resending">
                <span *ngIf="!resending">Doğrulama E-postasını Tekrar Gönder</span>
                <span *ngIf="resending" class="d-inline-flex align-items-center gap-2">
                  <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                  Gönderiliyor...
                </span>
              </button>
            </div>
          </div>
        </form>

        <div class="or-separator">
          <span>veya</span>
        </div>

          <div class="d-grid">
            <button type="button" class="btn btn-google w-100" (click)="googleLogin($event)" [disabled]="isLoading">
              <i class="bi bi-google"></i> Google ile Devam Et
            </button>
          </div>

        <div class="text-center mt-4">
          <p class="text-muted">
            Hesabınız yok mu? 
            <a [routerLink]="['/auth/register']" class="text-decoration-none">
              Kayıt Ol
            </a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
